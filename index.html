<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Bestie</title>
    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            text-align:center;
            color:white;
            overflow:hidden;
            background: radial-gradient(circle at top, #2b1055, #000000 70%);
        }

        .screen{
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            position:relative;
        }

        .hidden{ display:none; }

        /* DJ RGB Lights */
        .dj-light{
            position:fixed;
            bottom:0;
            width:250px;
            height:250px;
            filter:blur(120px);
            z-index:0;
            animation: rgb 5s infinite alternate;
        }
        .left{ left:-60px; background:red; }
        .right{ right:-60px; background:blue; }

        @keyframes rgb{
            0%{background:red;}
            25%{background:lime;}
            50%{background:blue;}
            75%{background:yellow;}
            100%{background:magenta;}
        }

        /* Confetti */
        .confetti{
            position:fixed;
            top:-10px;
            width:8px;
            height:18px;
            background:random;
            animation: fall linear infinite;
            z-index:2;
        }

        @keyframes fall{
            to{
                transform:translateY(110vh) rotate(720deg);
            }
        }

        #count{
            font-size:90px;
            text-shadow:0 0 20px white;
        }

        h1{
            font-size:48px;
            font-weight:bold;
            background: linear-gradient(45deg, #ffffff, #ffe600, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(255,255,255,0.8);
            z-index:3;
        }

        .image-frame{
            width:320px;
            height:570px;
            border-radius:25px;
            overflow:hidden;
            box-shadow:0 0 25px white;
            margin-top:20px;
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:3;
        }

        .image-frame img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

    </style>
</head>
<body>

<!-- DJ Lights -->
<div class="dj-light left"></div>
<div class="dj-light right"></div>

<!-- Welcome Screen -->
<div id="welcome" class="screen">
    <h1>Hey Mahila CR 🎁</h1>
    <h3>Your surprise is loading...</h3>
    <h2 id="count">3</h2>
</div>

<!-- Slider Screen -->
<div id="sliderScreen" class="screen hidden">
    <h1>Happy Birthday Manshi~ 🎉</h1>
    <div class="image-frame">
        <img id="slide" src="img1.png">
    </div>
</div>

<audio id="music" src="song.mpeg" loop></audio>

<script>
/* ---------------- Confetti Generator ---------------- */
function createConfetti(){
    const colors = ["red","yellow","lime","cyan","magenta","orange","white"];
    for(let i=0;i<80;i++){
        let conf = document.createElement("div");
        conf.classList.add("confetti");
        conf.style.left = Math.random()*100 + "vw";
        conf.style.background = colors[Math.floor(Math.random()*colors.length)];
        conf.style.animationDuration = (Math.random()*3+3)+"s";
        document.body.appendChild(conf);
    }
}
createConfetti();

/* ---------------- Countdown ---------------- */
let images = [
    "img1.png","img2.png","img3.png","img4.png","img5.png",
    "img6.png","img7.png","img8.png","img9.jpeg","img10.jpeg"
];

let i = 0;
let count = 3;

let counter = setInterval(()=>{
    document.getElementById("count").innerText = count;
    count--;
    if(count < 0){
        clearInterval(counter);
        startSlider();
    }
},1000);

/* ---------------- Start Slider + Music ---------------- */
function startSlider(){
    document.getElementById("welcome").classList.add("hidden");
    document.getElementById("sliderScreen").classList.remove("hidden");

    let music = document.getElementById("music");
    music.play().catch(()=>{});

    setInterval(changeSlide,2000);
}

function changeSlide(){
    i = (i + 1) % images.length;
    document.getElementById("slide").src = images[i];
}
</script>
<script>
let musicStarted = false;

function startMusicOnce(){
    if(!musicStarted){
        let music = document.getElementById("music");
        music.play();
        musicStarted = true;
    }
}

// User interaction se music start
document.body.addEventListener("click", startMusicOnce);
document.body.addEventListener("touchstart", startMusicOnce);
</script>
</body>
</html>
